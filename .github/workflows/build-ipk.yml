name: Build chan_quectel x86_64 IPK for iStoreOS
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉取源码
      - name: Checkout source code
        uses: actions/checkout@v4

      # 更换国内清华apt源，加速依赖安装
      - name: Switch Tsinghua apt mirror
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo sed -i 's/security.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo apt clean
          sudo apt update -qq --fix-missing
          sudo apt install -y git wget build-essential cmake libsqlite3-dev libasound2-dev libudev-dev libssl-dev libncurses-dev libedit-dev libjansson-dev

      # 下载、编译同版本 Asterisk 20.8.1，保证ABI完全匹配
      - name: Compile Asterisk 20.8.1
        run: |
          wget --retry-connrefused --waitretry=5 https://downloads.asterisk.org/pub/telephony/asterisk/asterisk-20.8.1.tar.gz
          tar -zxf asterisk-20.8.1.tar.gz
          cd asterisk-20.8.1
          ./configure --prefix=/usr/local/asterisk
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      # 编译 chan_quectel.so
      - name: Build chan_quectel driver
        run: |
          rm -rf build && mkdir build && cd build
          cmake .. -DASTERISK_HEADERS=/usr/local/asterisk/include -DENABLE_UAC=ON
          make -j$(nproc)

      # 手动构造OpenWrt标准IPK安装包
      - name: Package to IPK
        run: |
          mkdir -p ipk/usr/lib/asterisk/modules
          cp build/chan_quectel.so ipk/usr/lib/asterisk/modules/
          mkdir ipk/CONTROL
          cat > ipk/CONTROL/control <<EOF
Package: asterisk-chan-quectel
Version: 1.0
Architecture: x86_64
Maintainer: user
Depends: asterisk
Description: Quectel EC20/EC25 Asterisk channel driver
EOF
          tar -czf asterisk-chan-quectel_x86_64.ipk -C ipk .

      # 上传成品IPK
      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chan-quectel-x86_64-istoreos
          path: asterisk-chan-quectel_x86_64.ipk
