name: iStoreOS Quectel 驱动 x86_64

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库源码
        uses: actions/checkout@v4

      - name: 预装编译工具
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git gawk gettext \
            libncurses-dev unzip bzip2 flex bison python3 xz-utils \
            rsync wget file

      - name: 下载 OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          wget -q --show-progress "$SDK_URL" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: 配置SDK并导入驱动
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/asterisk-chan-quectel
          cp -r $GITHUB_WORKSPACE/openwrt/* package/asterisk-chan-quectel/
          sed -i 's/DEPENDS:=+asterisk16/DEPENDS:=+asterisk/g' package/asterisk-chan-quectel/Makefile

      - name: 编译驱动
        run: |
          cd sdk
          # 生成基础配置
          make defconfig
          # 直接追加配置（确保依赖包也被选中）
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_asterisk=m
          CONFIG_PACKAGE_asterisk-chan-quectel=m
          EOF
          # 同步依赖关系
          make defconfig
          # 编译
          make -j$(nproc) V=s package/asterisk-chan-quectel/compile

      - name: 调试：查找所有生成的文件
        if: always()
        run: |
          echo "===== 查找所有 IPK ====="
          find sdk -name "*.ipk" | grep -i quectel || echo "未找到 quectel 相关 IPK"
          echo "===== 查找 bin 目录 ====="
          find sdk -type d -name "bin" | head -5

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: Quectel-驱动-iStoreOS
          path: |
            sdk/bin/packages/x86_64/*/*quectel*.ipk
            sdk/bin/packages/x86_64/*/asterisk-chan-quectel*.ipk
          if-no-files-found: warn
