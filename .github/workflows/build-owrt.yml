name: Build chan-quectel IPK x86_64
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container: openwrt:23.05
    steps:
      - name: 安装编译依赖
        run: |
          opkg update
          opkg install git cmake build-essential asterisk-dev libsqlite3-dev libasound2-dev libudev-dev
      - name: 拉取源码编译
        run: |
          git clone https://github.com/AlchemillaHQ/asterisk-chan-quectel
          cd asterisk-chan-quectel
          rm -rf build && mkdir build && cd build
          cmake .. -DENABLE_UAC=ON
          make -j$(nproc)
          # 打包ipk
          mkdir -p ipk/usr/lib/asterisk/modules
          cp chan_quectel.so ipk/usr/lib/asterisk/modules/
          echo "Package: asterisk-chan-quectel" > ipk/control
          echo "Version: 1.0" >> ipk/control
          echo "Architecture: x86_64" >> ipk/control
          echo "Depends: asterisk" >> ipk/control
          tar -czf asterisk-chan-quectel_x86_64.ipk -C ipk .
      - name: 上传ipk
        uses: actions/upload-artifact@v4
        with:
          path: asterisk-chan-quectel_x86_64.ipk
