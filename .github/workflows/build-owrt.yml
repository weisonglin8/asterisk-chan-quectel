name: Build chan-quectel IPK x86_64
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 下载并解压 OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          wget -q "$SDK_URL" -O sdk.tar.xz
          tar xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: 拉取 asterisk-chan-quectel 源码
        run: |
          git clone --depth 1 https://github.com/AlchemillaHQ/asterisk-chan-quectel.git
          # 创建 OpenWrt 包目录
          mkdir -p sdk/package/asterisk-chan-quectel
          # 复制源码
          cp -r asterisk-chan-quectel/* sdk/package/asterisk-chan-quectel/

      - name: 创建 OpenWrt Makefile
        run: |
          cat > sdk/package/asterisk-chan-quectel/Makefile << 'EOF'
          include $(TOPDIR)/rules.mk

          PKG_NAME:=asterisk-chan-quectel
          PKG_VERSION:=1.0
          PKG_RELEASE:=1

          PKG_SOURCE_PROTO:=git
          PKG_SOURCE_URL:=https://github.com/AlchemillaHQ/asterisk-chan-quectel.git
          PKG_SOURCE_VERSION:=HEAD
          PKG_MIRROR_HASH:=skip

          PKG_MAINTAINER:=AlchemillaHQ
          PKG_LICENSE:=GPL-2.0

          include $(INCLUDE_DIR)/package.mk
          include $(INCLUDE_DIR)/cmake.mk

          define Package/asterisk-chan-quectel
            SUBMENU:=Telephony
            SECTION:=net
            CATEGORY:=Network
            TITLE:=Quectel channel driver for Asterisk
            URL:=https://github.com/AlchemillaHQ/asterisk-chan-quectel
            DEPENDS:=+asterisk20 +libsqlite3 +alsa-lib +libudev-zero
          endef

          define Package/asterisk-chan-quectel/description
            Asterisk channel driver for Quectel LTE modules with UAC support
          endef

          CMAKE_OPTIONS += \
            -DENABLE_UAC=ON \
            -DASTERISK_INCLUDE_DIR=$(STAGING_DIR)/usr/include/asterisk \
            -DASTERISK_LIB_DIR=$(STAGING_DIR)/usr/lib

          define Package/asterisk-chan-quectel/install
            $(INSTALL_DIR) $(1)/usr/lib/asterisk/modules
            $(INSTALL_BIN) $(PKG_BUILD_DIR)/chan_quectel.so $(1)/usr/lib/asterisk/modules/
            $(INSTALL_DIR) $(1)/etc/asterisk
            $(INSTALL_DATA) $(PKG_BUILD_DIR)/quectel.conf $(1)/etc/asterisk/
          endef

          $(eval $(call BuildPackage,asterisk-chan-quectel))
          EOF

      - name: 更新 feeds 并安装依赖
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # 确保 asterisk20 和依赖可用
          make defconfig

      - name: 编译
        run: |
          cd sdk
          make package/asterisk-chan-quectel/compile V=s -j$(nproc)

      - name: 上传 IPK
        uses: actions/upload-artifact@v4
        with:
          name: asterisk-chan-quectel_x86_64
          path: sdk/bin/packages/x86_64/base/asterisk-chan-quectel_*.ipk
