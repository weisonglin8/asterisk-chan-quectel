name: 构建频道 - OpenWRT x86_64

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前仓库（包含 chan-quectel 源码）
      - name: 拉取当前仓库
        uses: actions/checkout@v4

      # 2. 安装编译依赖
      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git gawk gettext \
            libncurses-dev unzip bzip2 flex bison python3 xz-utils \
            rsync file wget

      # 3. 下载 OpenWRT 23.05.5 x86_64 SDK（预编译工具链）
      - name: 下载 OpenWRT SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          wget -q --show-progress "$SDK_URL" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      # 4. 配置 SDK、复制插件、适配Asterisk20
      - name: 配置 SDK 并复制插件
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/asterisk-chan-quectel
          cp -r $GITHUB_WORKSPACE/openwrt/* package/asterisk-chan-quectel/
          # 适配OpenWRT23.05 Asterisk20
          sed -i 's/DEPENDS:=+asterisk16/DEPENDS:=+asterisk/g' package/asterisk-chan-quectel/Makefile

      # 5. 编译插件
      - name: 编译 quectel 插件
        run: |
          cd sdk
          make defconfig
          echo 'CONFIG_PACKAGE_asterisk-chan-quectel=m' >> .config
          make defconfig
          make -j$(nproc) V=s package/asterisk-chan-quectel/compile

      # 6. 仅上传我们编译的单一ipk（只有几十KB）
      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: quectel-x86_64-single-ipk
          # 只匹配这个模块的安装包，其他系统包全部忽略
          path: sdk/bin/packages/x86_64/base/asterisk-chan-quectel_*.ipk
          if-no-files-found: error
