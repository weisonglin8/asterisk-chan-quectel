name: 构建频道 - OpenWRT x86_64
on:
  push:
  workflow_dispatch: # 支持页面手动点击运行
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库源码
        uses: actions/checkout@v4

      - name: 下载iStoreOS x86_64 SDK（移除失效ghproxy代理，原生Github链接）
        run: |
          # 重试3次防止网络波动
          for i in {1..3}; do
            wget https://github.com/istoreos/istoreos-sdk-x86_64/releases/download/23.10/openwrt-sdk-x86_64-generic_gcc-12.3_musl.Linux-x86_64.tar.xz && break
            sleep 10
          done
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-x86_64-generic_gcc-12.3_musl.Linux-x86_64 sdk

      - name: 复制插件到SDK包目录
        run: cp -r openwrt sdk/package/asterisk-chan-quectel

      - name: 加载Asterisk依赖
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install asterisk

      - name: 交叉编译IPK
        run: make package/asterisk-chan-quectel/compile V=s -C sdk

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: quectel-x86_64-ipk
          path: sdk/bin/packages/x86_64/base/*.ipk
