name: 编译asterisk-chan-quectel x86_64 IPK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: gitee/checkout@v4

      - name: 安装系统编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential git gawk gettext libncurses-dev unzip bzip2 flex bison xz-utils python3

      - name: 克隆iStoreOS主源码（Gitee国内镜像，不会404）
        run: |
          git clone https://gitee.com/istoreos/istoreos.git sdk
          cd sdk
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install asterisk

      - name: 复制插件包到SDK
        run: cp -r ./openwrt sdk/package/asterisk-chan-quectel

      - name: 适配Asterisk18版本依赖
        run: sed -i 's/DEPENDS:=+asterisk16/DEPENDS:=+asterisk18/g' sdk/package/asterisk-chan-quectel/Makefile

      - name: 锁定x86_64架构
        run: |
          cd sdk
          make defconfig
          echo 'CONFIG_PACKAGE_asterisk-chan-quectel=y' >> .config
          sed -i 's/# CONFIG_TARGET_x86_64_GENERIC=y/CONFIG_TARGET_x86_64_GENERIC=y/g' .config

      - name: 单线程编译，防止内存溢出
        run: make -j1 package/asterisk-chan-quectel/compile V=s -C sdk

      - name: 上传编译产物IPK
        uses: gitee/upload-artifact@v4
        with:
          name: quectel-x86_64-ipk
          path: sdk/bin/packages/x86_64/base/*.ipk
