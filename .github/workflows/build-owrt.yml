name: Build chan_quectel for Asterisk 20.8.1
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: 基础系统依赖更新
        run: |
          sudo apt update -qq
          sudo apt upgrade -y -qq
          sudo apt install -y -qq git wget build-essential cmake libsqlite3-dev libasound2-dev libudev-dev libssl-dev libncurses-dev libedit-dev libjansson-dev cpack

      - name: 下载 Asterisk 20.8.1 源码
        run: |
          wget https://downloads.asterisk.org/pub/telephony/asterisk/asterisk-20.8.1.tar.gz
          tar zxf asterisk-20.8.1.tar.gz
          cd asterisk-20.8.1

      - name: 编译安装 Asterisk 20.8.1
        run: |
          cd asterisk-20.8.1
          ./configure --prefix=/usr/local/asterisk
          make -j$(nproc)
          sudo make install
          sudo make samples
          sudo ldconfig

      - name: 拉取 chan-quectel 源码
        uses: actions/checkout@v4

      - name: CMake 编译 chan-quectel（指定Asterisk20.8.1头文件）
        run: |
          rm -rf build
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DASTERISK_HEADERS=/usr/local/asterisk/include \
            -DENABLE_UAC=ON \
            -DCMAKE_INSTALL_PREFIX=/usr/local/asterisk/modules
          make -j$(nproc)
          sudo make install

      - name: 打包deb安装包
        run: |
          cd build
          cpack -G DEB
          ls -lh *.deb

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: chan-quectel-ast20.8.1-x86_64
          path: build/*.deb
