name: 编译asterisk-chan-quectel x86_64 IPK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: gitee/checkout@v4
      - name: 下载iStoreOS SDK
        run: |
          wget https://mirror.ghproxy.com/https://github.com/istoreos/istoreos-sdk-x86_64/releases/download/23.10/openwrt-sdk-x86_64-generic_gcc-12.3_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-x86_64-generic_gcc-12.3_musl.Linux-x86_64 sdk
      - name: 复制插件
        run: cp -r openwrt sdk/package/asterisk-chan-quectel
      - name: 安装依赖
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install asterisk
      - name: 编译IPK
        run: make package/asterisk-chan-quectel/compile V=s -C sdk
      - name: 输出安装包
        uses: gitee/upload-artifact@v4
        with:
          name: quectel-x86-ipk
          path: sdk/bin/packages/x86_64/base/*.ipk
