name: Build asterisk-chan-quectel IPK x86_64 (iStoreOS J1900)
on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      # 换清华源加速
      - name: 替换国内apt镜像
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo sed -i 's/security.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo apt clean
          sudo apt update -qq --fix-missing
          sudo apt upgrade -y -qq --fix-missing

      # 安装编译依赖（无python3-distutils）
      - name: 安装OpenWrt编译工具链
        run: |
          sudo apt install -y -qq \
            build-essential git wget unzip bzip2 file flex bison perl \
            python3 python3-pip swig libncurses-dev libssl-dev zlib1g-dev

      # 拉取OpenWrt 23.05
      - name: 克隆OpenWrt 23.05
        run: |
          git clone --depth=1 https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout openwrt-23.05
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 关键修复：提取仓库openwrt目录内打包文件到标准包路径
      - name: 导入asterisk-chan-quectel包
        run: |
          cd openwrt
          # 克隆源码到临时文件夹
          git clone --depth=1 https://github.com/AlchemillaHQ/asterisk-chan-quectel /tmp/cqsrc
          # 创建标准telephony包目录
          mkdir -p package/telephony/asterisk-chan-quectel
          # 复制仓库openwrt下所有打包文件（Makefile就在这里）
          cp -r /tmp/cqsrc/openwrt/* package/telephony/asterisk-chan-quectel/
          # 调试打印：确认Makefile存在，方便排错
          echo "===== 检查包Makefile ====="
          ls -la package/telephony/asterisk-chan-quectel/
          # 重载feeds识别新包
          ./scripts/feeds update telephony
          ./scripts/feeds install asterisk-chan-quectel
          rm -rf /tmp/cqsrc

      # 生成x86_64配置
      - name: 生成编译配置
        run: |
          cd openwrt
          echo "CONFIG_TARGET_x86=y" >> .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_PACKAGE_asterisk=y" >> .config
          echo "CONFIG_PACKAGE_asterisk-chan-quectel=y" >> .config
          make defconfig
          make menuconfig -n

      # 编译IPK（路径固定为telephony分类下）
      - name: 编译IPK安装包
        run: |
          cd openwrt
          make package/telephony/asterisk-chan-quectel/compile -j$(nproc) V=sc

      # 上传产物
      - name: 上传IPK文件
        uses: actions/upload-artifact@v4
        with:
          name: chan-quectel-x86_64-istoreos
          path: openwrt/bin/packages/x86_64/telephony/*.ipk
