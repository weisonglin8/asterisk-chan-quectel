name: 构建频道 - OpenWRT x86_64

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前仓库（包含 chan-quectel 源码）
      - name: 拉取当前仓库
        uses: actions/checkout@v4

      # 2. 安装编译依赖
      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git gawk gettext \
            libncurses-dev unzip bzip2 flex bison python3 xz-utils \
            rsync file wget

      # 3. 下载 OpenWRT 23.05.5 x86_64 SDK（已包含预编译工具链）
      - name: 下载 OpenWRT SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          wget -q --show-progress "$SDK_URL" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      # 4. 配置 SDK：更新 feeds、安装 telephony feed、复制插件包
      - name: 配置 SDK 并复制插件
        run: |
          cd sdk
          
          # 更新所有 feeds（包含 telephony，其中有 asterisk 20.x）
          ./scripts/feeds update -a
          
          # 安装 feeds（创建符号链接）
          ./scripts/feeds install -a
          
          # 复制你的插件到 SDK
          mkdir -p package/asterisk-chan-quectel
          cp -r $GITHUB_WORKSPACE/openwrt/* package/asterisk-chan-quectel/
          
          # 适配OpenWRT23.05 Asterisk20，替换依赖为通用asterisk包名
          sed -i 's/DEPENDS:=+asterisk16/DEPENDS:=+asterisk/g' package/asterisk-chan-quectel/Makefile

      # 5. 编译
      - name: 编译 quectel 插件
        run: |
          cd sdk
          # 生成默认配置
          make defconfig
          # 显式启用我们的包
          echo 'CONFIG_PACKAGE_asterisk-chan-quectel=m' >> .config
          make defconfig
          # 多线程编译，SDK自带工具链，不会编译完整toolchain
          make -j$(nproc) V=s package/asterisk-chan-quectel/compile

      # 6. 上传产物
      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: quectel-x86_64-ipk
          path: |
            sdk/bin/packages/x86_64/*/*.ipk
          if-no-files-found: error
