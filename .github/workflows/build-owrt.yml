name: Build asterisk-chan-quectel IPK (x86_64 iStoreOS J1900)
on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  compile-ipk-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: 替换清华Ubuntu镜像，修复软件源索引
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo sed -i 's/security.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo apt clean
          sudo apt update -qq --fix-missing
          sudo apt upgrade -y -qq --fix-missing

      - name: 安装OpenWrt编译工具链（兼容Ubuntu24.04）
        run: |
          sudo apt install -y -qq \
            build-essential git wget unzip curl bzip2 file \
            flex bison perl python3 python3-pip swig \
            libncurses-dev libssl-dev zlib1g-dev

      - name: 克隆 OpenWrt 23.05
        run: |
          git clone https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git checkout openwrt-23.05
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 修复：正确提取仓库内openwrt打包文件，生成标准包目录
      - name: 引入 asterisk-chan-quectel 软件包（修复目录结构）
        run: |
          cd openwrt
          git clone https://github.com/AlchemillaHQ/asterisk-chan-quectel /tmp/chanq-src
          mkdir -p package/telephony/asterisk-chan-quectel
          cp -r /tmp/chanq-src/openwrt/* package/telephony/asterisk-chan-quectel/
          rm -rf /tmp/chanq-src
          ./scripts/feeds update telephony
          ./scripts/feeds install asterisk-chan-quectel

      - name: 生成 x86_64 编译配置（强制同步feeds）
        run: |
          cd openwrt
          echo "CONFIG_TARGET_x86=y" >> .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_PACKAGE_asterisk=y" >> .config
          echo "CONFIG_PACKAGE_asterisk-chan-quectel=y" >> .config
          make defconfig
          make menuconfig -n

      - name: 编译 IPK 安装包（完整日志输出）
        run: |
          cd openwrt
          make package/telephony/asterisk-chan-quectel/compile -j$(nproc) V=sc

      - name: 上传编译好的ipk文件
        uses: actions/upload-artifact@v4
        with:
          name: chan-quectel-x86_64-istoreos-j1900
          path: openwrt/bin/packages/x86_64/telephony/*.ipk
