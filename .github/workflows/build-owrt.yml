name: 构建Quectel x86_64 精简单包
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取项目源码
      - name: 拉取当前仓库
        uses: actions/checkout@v4

      # 2. 预装编译环境依赖
      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git gawk gettext \
            libncurses-dev unzip bzip2 flex bison python3 xz-utils \
            rsync file wget

      # 3. 下载OpenWrt 23.05.5 x86_64 SDK
      - name: 下载 OpenWRT SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          wget -q --show-progress "$SDK_URL" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      # 4. 初始化SDK、复制插件、适配Asterisk20
      - name: 配置 SDK 并复制插件
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/asterisk-chan-quectel
          cp -r $GITHUB_WORKSPACE/openwrt/* package/asterisk-chan-quectel/
          sed -i 's/DEPENDS:=+asterisk16/DEPENDS:=+asterisk/g' package/asterisk-chan-quectel/Makefile

      # 5. 编译插件 + 打印真实IPK路径方便排查
      - name: 编译 quectel 插件
        run: |
          cd sdk
          make defconfig
          echo 'CONFIG_PACKAGE_asterisk-chan-quectel=m' >> .config
          make defconfig
          make -j$(nproc) V=s package/asterisk-chan-quectel/compile
          # 打印生成的ipk完整路径
          echo "=== 已编译的IPK文件列表 ==="
          find sdk/bin -name "asterisk-chan-quectel_*.ipk"

      # 6. 上传产物（同时匹配base、telephony两个目录，解决找不到文件报错）
      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: quectel-x86_64-single-ipk
          path: |
            sdk/bin/packages/x86_64/base/asterisk-chan-quectel_*.ipk
            sdk/bin/packages/x86_64/telephony/asterisk-chan-quectel_*.ipk
          if-no-files-found: error
