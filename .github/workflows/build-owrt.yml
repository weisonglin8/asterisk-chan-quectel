name: 构建频道 - OpenWRT x86_64
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取当前chan-quectel源码
        uses: actions/checkout@v4

      - name: 安装系统编译依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential git gawk gettext libncurses-dev unzip bzip2 flex bison python3 python3-pip

      - name: 拉取完整iStoreOS源码
        run: |
          git clone https://github.com/istoreos/istoreos.git sdk
          cd sdk
          ./scripts/feeds clean
          ./scripts/feeds update -a
          ./scripts/feeds install asterisk

      - name: 复制quectel插件包到SDK
        run: cp -r ./openwrt sdk/package/asterisk-chan-quectel

      - name: 强制指定x86_64架构配置（修复MIPS错乱）
        run: |
          cd sdk
          # 加载x86_64通用配置，锁定架构，避免自动切mips
          ./scripts/gen_config x86_64 generic
          echo 'CONFIG_PACKAGE_asterisk-chan-quectel=y' >> .config
          # 强制编译Asterisk18，适配iStoreOS默认版本，消除asterisk16警告
          sed -i 's/DEPENDS:=+asterisk16/DEPENDS:=+asterisk18/g' package/asterisk-chan-quectel/Makefile

      - name: 仅交叉编译quectel插件IPK（单线程防内存溢出）
        run: make -j1 package/asterisk-chan-quectel/compile V=s -C sdk

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: quectel-x86_64-ipk
          path: sdk/bin/packages/x86_64/base/*.ipk
