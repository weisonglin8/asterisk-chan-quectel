name: Build asterisk-chan-quectel IPK (iStoreOS 23.05 x86_64 ABI匹配)
on:
  workflow_dispatch:
jobs:
  build-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: 换清华apt源
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo sed -i 's/security.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo apt clean && sudo apt update -qq --fix-missing
          sudo apt install -y build-essential git wget unzip flex bison python3 python3-pip libncurses-dev libssl-dev zlib1g-dev swig

      - name: 拉取OpenWrt 23.05 SDK x86_64（和iStoreOS底层完全一致）
        run: |
          wget https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt-sdk
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install asterisk

      - name: 导入chan-quectel包
        run: |
          cd openwrt-sdk
          git clone https://github.com/AlchemillaHQ/asterisk-chan-quectel /tmp/cq
          mkdir -p package/telephony/asterisk-chan-quectel
          cp -r /tmp/cq/openwrt/* package/telephony/asterisk-chan-quectel/
          ./scripts/feeds update telephony
          ./scripts/feeds install asterisk-chan-quectel

      - name: 编译IPK
        run: |
          cd openwrt-sdk
          make package/telephony/asterisk-chan-quectel/compile -j$(nproc) V=sc

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: chan-quectel-abi-match-x86_64
          path: openwrt-sdk/bin/packages/x86_64/telephony/*.ipk
