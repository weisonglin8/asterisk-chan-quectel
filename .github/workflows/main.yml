name: Build IPK for iStoreOS 24.10 x86_64
on:
  workflow_dispatch: # 手动一键编译按钮

jobs:
  build_ipk:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取你仓库全部源码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 2. 换国内清华apt源，解决国外服务器下载超时
      - name: 更换国内apt镜像
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo sed -i 's/security.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo apt clean
          sudo apt update -qq --fix-missing
          sudo apt install -y build-essential git wget unzip flex bison python3 python3-pip libncurses-dev libssl-dev zlib1g-dev swig

      # 3. 下载OpenWrt 24.10.7 x86_64 SDK（和iStoreOS底层完全一致，杜绝ABI不匹配）
      - name: 下载OpenWrt官方SDK
        run: |
          wget https://downloads.openwrt.org/releases/24.10.7/targets/x86/64/openwrt-sdk-24.10.7-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* openwrt-sdk
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install asterisk

      # 4. 复制仓库OpenWRT打包文件到SDK（重点：你的文件夹是大写OpenWRT，修正大小写）
      - name: 导入软件包到编译SDK
        run: |
          cd openwrt-sdk
          mkdir -p package/telephony/asterisk-chan-quectel
          # 匹配仓库大写OpenWRT文件夹，不会复制失败
          cp -r $GITHUB_WORKSPACE/OpenWRT/* package/telephony/asterisk-chan-quectel/
          ./scripts/feeds update telephony
          ./scripts/feeds install asterisk-chan-quectel
          # 打印目录校验是否复制成功
          ls -la package/telephony/asterisk-chan-quectel/

      # 5. 生成x86_64编译配置
      - name: 生成编译配置
        run: |
          cd openwrt-sdk
          echo "CONFIG_TARGET_x86=y" >> .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_PACKAGE_asterisk=y" >> .config
          echo "CONFIG_PACKAGE_asterisk-chan-quectel=y" >> .config
          make defconfig

      # 6. 单独编译模块IPK包
      - name: 编译IPK安装包
        run: |
          cd openwrt-sdk
          make package/telephony/asterisk-chan-quectel/compile -j$(nproc) V=sc

      # 7. 上传编译完成的ipk文件，供你下载
      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: chan-quectel-x86_64-istoreos24.10
          path: openwrt-sdk/bin/packages/x86_64/telephony/*.ipk
